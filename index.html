<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitty Whiscape</title>
  <link rel="stylesheet" href="style.css?v=20260616-image-menu1">
</head>
<body>
  <main class="app">
    <canvas id="gameCanvas" width="1280" height="720" aria-label="Kitty Whiscape canvas game"></canvas>

    <section id="storyIntro" class="story-intro active" aria-label="Kitty Whiscape story intro">
      <div class="story-stage">
        <div id="introKitty" class="story-cat kitty-pop">
          <span></span><span></span>
        </div>
        <div id="introElder" class="story-cat elder-cat" aria-hidden="true"></div>
        <article class="speech-bubble">
          <p id="storyText"></p>
          <button id="storyNext" type="button">Next</button>
        </article>
      </div>
    </section>

    <section id="menu" class="image-menu" hidden aria-label="Kitty Whiscape main menu">
      <div class="menu-art" aria-label="Kitty Whiscape level and version selection">
        <img src="kitttty.png" alt="Kitty Whiscape haunted mansion menu">

        <div class="title-letter-layer" aria-hidden="true">
          <span>K</span><span>i</span><span>t</span><span>t</span><span>y</span>
          <span>&nbsp;</span>
          <span>W</span><span>h</span><span>i</span><span>s</span><span>c</span><span>a</span><span>p</span><span>e</span>
        </div>

        <div class="menu-runner" aria-hidden="true"></div>

        <button class="menu-hotspot level-hotspot level-1 unlocked" type="button" data-level="0" aria-label="Start Level 1"></button>
        <button class="menu-hotspot level-hotspot level-2 locked" type="button" data-level="1" aria-label="Start Level 2"></button>
        <button class="menu-hotspot level-hotspot level-3 locked" type="button" data-level="2" aria-label="Start Level 3"></button>
        <button class="menu-hotspot level-hotspot level-4 locked" type="button" data-level="3" aria-label="Start Level 4"></button>
        <button class="menu-hotspot level-hotspot level-5 locked" type="button" data-level="4" aria-label="Start Level 5"></button>

        <button id="playButton" class="menu-hotspot version-hotspot classic active" type="button" data-mode="classic" aria-label="Classic Story"></button>
        <button class="menu-hotspot version-hotspot speedrun locked" type="button" data-mode="speedrun" data-locked="true" aria-label="Speedrun Mode"></button>
        <button class="menu-hotspot version-hotspot endless locked" type="button" data-mode="endless" data-locked="true" aria-label="Endless Mansion"></button>

        <button id="roomsButton" class="menu-hotspot choose-hotspot" type="button" aria-label="Choose room list"></button>
        <button id="editorButton" class="menu-hotspot editor-hotspot" type="button" aria-label="Level Data"></button>
      </div>
    </section>

    <section id="levelSelect" class="panel level-select mansion-panel" hidden>
      <div class="editor-head">
        <h2>Nancy's Mansion</h2>
        <button id="backToMenu" type="button">Main Menu</button>
      </div>
      <p>Choose an unlocked room. Completing a room unlocks the next door.</p>
      <div id="levelMap" class="level-map" aria-label="Nancy's mansion level map"></div>
    </section>

    <section id="pauseMenu" class="panel pause-menu mansion-panel" hidden>
      <h2>Paused</h2>
      <button id="continueButton" type="button">Continue</button>
      <button id="quitButton" type="button">Quit to Level Select</button>
    </section>

    <section id="levelEditor" class="panel editor mansion-panel" hidden>
      <div class="editor-head">
        <h2>Editable Level JSON</h2>
        <button id="closeEditor" type="button">Close</button>
      </div>
      <p>Copy this structure to add rooms, platforms, stars, fish, yarn, web points, enemies, bosses, and breakable props.</p>
      <textarea id="levelJson" spellcheck="false"></textarea>
    </section>

    <div id="transitionFade" class="transition-fade"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="game.js?v=20260616-image-menu1"></script>
</body>
</html>
